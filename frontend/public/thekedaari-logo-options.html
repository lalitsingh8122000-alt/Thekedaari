<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thekedaari.com Logo Options</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f1f5f9; color: #0f172a; }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
      h1 { margin: 0 0 6px; }
      p { margin: 0 0 20px; color: #475569; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
      .card { background: #fff; border-radius: 14px; padding: 14px; box-shadow: 0 2px 10px rgba(0,0,0,.07); }
      img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; background: #e2e8f0; }
      .name { margin-top: 8px; font-size: 13px; color: #334155; word-break: break-word; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Thekedaari.com Icon Concepts</h1>
      <p>Open this page in browser to compare all 10 options.</p>
      <div class="grid">
        <div class="card"><img src="/thekedaari-icon-01-hardhat-check.svg" alt="Option 1"/><div class="name">01 - Hardhat + Check</div></div>
        <div class="card"><img src="/thekedaari-icon-02-building-ledger.svg" alt="Option 2"/><div class="name">02 - Building + Ledger</div></div>
        <div class="card"><img src="/thekedaari-icon-03-hammer-rupee.svg" alt="Option 3"/><div class="name">03 - Hammer + Rupee</div></div>
        <div class="card"><img src="/thekedaari-icon-04-brick-tk.svg" alt="Option 4"/><div class="name">04 - Brick TK</div></div>
        <div class="card"><img src="/thekedaari-icon-05-site-pin-crane.svg" alt="Option 5"/><div class="name">05 - Site Pin + Crane</div></div>
        <div class="card"><img src="/thekedaari-icon-06-shield-tools.svg" alt="Option 6"/><div class="name">06 - Shield + Tools</div></div>
        <div class="card"><img src="/thekedaari-icon-07-clipboard-helmet.svg" alt="Option 7"/><div class="name">07 - Clipboard + Helmet</div></div>
        <div class="card"><img src="/thekedaari-icon-08-growth-trowel.svg" alt="Option 8"/><div class="name">08 - Growth + Trowel</div></div>
        <div class="card"><img src="/thekedaari-icon-09-crew-badge.svg" alt="Option 9"/><div class="name">09 - Crew Badge</div></div>
        <div class="card"><img src="/thekedaari-icon-10-bridge-rupee.svg" alt="Option 10"/><div class="name">10 - Bridge + Rupee</div></div>
      </div>
    </div>
  </body>
</html>
